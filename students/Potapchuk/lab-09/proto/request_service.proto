syntax = "proto3";

option csharp_namespace = "RequestGrpc";

package request;

// ==================== Сервис ====================
service RequestService {
  rpc CreateRequest (CreateRequestRequest) returns (CreateRequestResponse);
  rpc GetRequest (GetRequestRequest) returns (RequestDto);
  rpc StreamActiveRequests (StreamRequest) returns (stream RequestDto);  // Server-side streaming
}

// ==================== Сообщения ====================
message CreateRequestRequest {
  string title = 1;
  string description = 2;
  string requester_id = 3;
  string zone_id = 4;
  int32 emergency_level = 5;
}

message CreateRequestResponse {
  string request_id = 1;
  string status = 2;
}

message GetRequestRequest {
  string request_id = 1;
}

message RequestDto {
  string id = 1;
  string title = 2;
  string status = 3;
  int32 emergency_level = 4;
  string zone_id = 5;
  string requester_id = 6;
}

message StreamRequest {
  string zone_id = 1;   // фильтр по зоне (опционально)
}